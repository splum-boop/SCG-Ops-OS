<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCG Ops OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:        #0f0f1a;
      --bg-card:        #16213e;
      --bg-header:      #0d0d1b;
      --border:         #1e2a4a;
      --text-primary:   #f0f4ff;
      --text-secondary: #8b9abf;
      --text-dim:       #4a5578;
      --green:  #22c55e;
      --yellow: #eab308;
      --red:    #ef4444;
      --purple: #6366f1;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg-base);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root { min-height: 100vh; display: flex; flex-direction: column; }

    /* Flex grid — justify-content:center auto-centers incomplete last rows (e.g. 5 cards) */
    .kpi-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }
    .kpi-card-wrap {
      flex: 0 0 var(--card-basis);
      min-width: 0;
    }
    @media (max-width: 767px) {
      .kpi-card-wrap { flex: 0 0 100% !important; }
      .hide-mobile   { display: none !important; }
    }
    @media (min-width: 768px) and (max-width: 1023px) {
      .kpi-card-wrap { flex: 0 0 calc(50% - 7px) !important; }
    }

    @keyframes shimmer { 0%,100%{opacity:.35} 50%{opacity:.65} }
    .skeleton { animation: shimmer 1.6s ease-in-out infinite; background: var(--border); border-radius: 8px; }

    @keyframes rotate { to { transform: rotate(360deg); } }
    .spinning { animation: rotate 0.8s linear infinite; display: inline-block; transform-origin: center; }

    .ring-progress { transition: stroke-dashoffset 0.7s cubic-bezier(0.4,0,0.2,1), stroke 0.4s ease; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

/* ══════════════════════════════════════════════════════════════════════
   CONFIG
   Token is stored in localStorage — never hardcoded or committed.
   ══════════════════════════════════════════════════════════════════════ */
const CONFIG = {
  BASE_ID:       'appTxjUklSxnapgJr',
  SALES_TABLE:   'Daily Sales & Labor',
  TARGETS_TABLE: 'KPI Targets',
  BUSINESS_NAME: 'SCG',
  LOCATION_NAME: 'Main Location',
  REFRESH_MS:    5 * 60 * 1000,
  LS_KEY:        'scg_ops_token',       // localStorage key for the token
};

/* ══════════════════════════════════════════════════════════════════════
   FIELD MAPPINGS — "Daily Sales & Labor" table
   Exact field names as returned by the Airtable API.
   ══════════════════════════════════════════════════════════════════════ */
const F = {
  date:         'Date',
  grossSales:   'Gross Sales',
  salesBudget:  'Sales Plan / Budget',
  laborCost:    'Labor Cost',
  laborHours:   'Labor Hours',
  laborPct:     'Labor Percentage',
  splh:         'SPLH',
  avgCheck:     'Average Ticket',
  transactions: 'Transaction Count',
  storeNum:     'Store #',        // lookup from Store Locations table (returns array)
  // LY comparison fields
  lyGrossSales: 'LY Gross Sales',
  lyLaborPct:   'LY Labor Pct',
  lyLaborHours: 'LY Hours',
  lySplh:       'LY SPLH',
  lyAvgCheck:   'LY Avg Ticket',
  // Kept for backward compatibility — hidden by Fix 5 if no data
  foodCostPct:  'Food Cost %',
  wastePct:     'Waste %',
};

/* ══════════════════════════════════════════════════════════════════════
   KPI TARGETS FIELD AUTO-DETECTION
   Each entry lists candidate field names tried in order, case-insensitive.
   If your field names differ, add them to the front of the relevant array.
   ══════════════════════════════════════════════════════════════════════ */
const TF = {
  name:            ['Name', 'KPI', 'KPI Name', 'Metric', 'Label', 'KPI Label'],
  // Two target columns exist: "Target Value in $" (SPLH, Avg Check, Sales)
  // and "% Target Value" (Labor %, Food Cost %, Waste %). Both are listed;
  // buildTargets uses first-valid-number logic to pick whichever is populated.
  target:          ['Target Value in $', '% Target Value', 'Target', 'Target Value', 'Goal', 'KPI Target', 'Budget', 'Value'],
  yellowThreshold: ['Yellow Threshold', 'Yellow Alert', 'Warning Threshold', 'Threshold', 'Yellow', 'Warning', 'Alert'],
  higherIsBetter:  ['Higher is Better', 'Higher Is Better', 'Increasing', 'Higher', 'Direction'],
};

/* KPI display names — must match the "Name" field values in KPI Targets table */
const KPI = {
  SALES:      'Sales',
  LABOR:      'Labor %',
  LABOR_HRS:  'Labor Hours',
  FOOD_COST:  'Food Cost %',  // hidden if no data in Daily Sales table
  WASTE:      'Waste %',      // hidden if no data in Daily Sales table
  SPLH:       'SPLH',
  AVG_CHECK:  'Avg Check',
};

/* ══════════════════════════════════════════════════════════════════════
   AIRTABLE API
   ══════════════════════════════════════════════════════════════════════ */
async function fetchAll(tableName, token) {
  const all = [];
  let offset;
  do {
    const qs = new URLSearchParams({ pageSize: '100' });
    if (offset) qs.set('offset', offset);
    const url = `https://api.airtable.com/v0/${CONFIG.BASE_ID}/${encodeURIComponent(tableName)}?${qs}`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try { msg = (await res.json()).error?.message || msg; } catch {}
      const err = new Error(msg);
      err.isAuthError = res.status === 401 || res.status === 403;
      throw err;
    }
    const j = await res.json();
    all.push(...(j.records ?? []));
    offset = j.offset;
  } while (offset);
  return all;
}

/* Case-insensitive field lookup — tries each candidate name in order */
function getField(record, names) {
  const f = record.fields;
  for (const name of names) {
    if (name in f) return f[name];
    const k = Object.keys(f).find(k2 => k2.trim().toLowerCase() === name.trim().toLowerCase());
    if (k !== undefined) return f[k];
  }
  return undefined;
}

/* Build targets map with console debug output so field names can be verified */
function buildTargets(records) {
  /* ── Open browser DevTools (F12 → Console) to inspect these logs ── */
  console.group('[SCG Ops OS] KPI Targets — raw API response');
  console.log('Record count:', records.length);
  if (records.length > 0) {
    console.log('Field names found in Airtable:', Object.keys(records[0].fields));
  }
  records.forEach((r, i) => console.log(`Record ${i + 1}:`, { ...r.fields }));
  console.groupEnd();

  /* First-valid-number lookup: iterates candidates and returns the first
     that produces a finite number, skipping fields that are blank/null. */
  function firstValidNum(rec, candidates) {
    for (const candidate of candidates) {
      const raw = getField(rec, [candidate]);
      const v   = parseFloat(raw);
      if (!isNaN(v)) return v;
    }
    return NaN;
  }

  const map = {};
  for (const rec of records) {
    const name = getField(rec, TF.name);
    if (!name || typeof name !== 'string') continue;
    const key = name.trim();
    map[key] = {
      target:          firstValidNum(rec, TF.target),
      yellowThreshold: firstValidNum(rec, TF.yellowThreshold),
      higherIsBetter:  !!getField(rec, TF.higherIsBetter),
    };
  }

  if (Object.keys(map).length === 0) {
    console.warn(
      '[SCG Ops OS] ⚠️  No KPI targets loaded.\n' +
      'Check the TF constant field name arrays match your actual Airtable column names.\n' +
      'Field names found above — update TF.name / TF.target / etc. to match.'
    );
  } else {
    console.log('[SCG Ops OS] Resolved targets map (pre-scale):', map);
  }

  /* "% Target Value" stores percentages as decimals (0.25 = 25%).
     Multiply ×100 for percentage-type KPIs only.
     SPLH and Avg Check use "Target Value in $" (already in real units — no scaling). */
  const DECIMAL_KPIS = new Set([KPI.LABOR, KPI.FOOD_COST, KPI.WASTE]);
  for (const key of Object.keys(map)) {
    if (DECIMAL_KPIS.has(key)) {
      if (!isNaN(map[key].target))          map[key].target          *= 100;
      if (!isNaN(map[key].yellowThreshold)) map[key].yellowThreshold *= 100;
    }
  }
  console.group('[SCG Ops OS] Final resolved targets (after decimal scaling)');
  for (const [kpi, vals] of Object.entries(map)) {
    console.log(
      `  ${kpi.padEnd(14)} target=${isNaN(vals.target) ? '⚠️ NaN' : vals.target}` +
      `  yellow=${isNaN(vals.yellowThreshold) ? '⚠️ NaN' : vals.yellowThreshold}` +
      `  higherIsBetter=${vals.higherIsBetter}`
    );
  }
  console.groupEnd();
  return map;
}

/* ══════════════════════════════════════════════════════════════════════
   DATE HELPERS
   ══════════════════════════════════════════════════════════════════════ */
/* Sales budget field — tries each name in order, case-insensitive via normalization.
   "Sales Plan / Budget" (spaces around slash) is listed first per confirmed field name. */
const SALES_BUDGET_VARIANTS = [
  'Sales Plan / Budget', 'Sales Plan/Budget', 'Sales Plan', 'Budget', 'Sales Budget',
  'Daily Budget', 'Revenue Target', 'Sales Target', 'Plan',
];
function getSalesBudget(record) {
  const f = record.fields;
  for (const name of SALES_BUDGET_VARIANTS) {
    // exact match first
    if (name in f) { const v = parseFloat(f[name]); if (!isNaN(v) && v > 0) return v; }
    // case+space-insensitive fallback
    const norm = name.trim().toLowerCase();
    const key  = Object.keys(f).find(k => k.trim().toLowerCase() === norm);
    if (key) { const v = parseFloat(f[key]); if (!isNaN(v) && v > 0) return v; }
  }
  return 0;
}
const todayLocal  = () => { const d = new Date(); d.setHours(0,0,0,0); return d; };
/* Use LOCAL date components so UTC conversion never shifts the date (fixes off-by-one in non-UTC timezones) */
const isoStr      = d   => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const weekMonday  = d   => { const r = new Date(d), day = r.getDay(); r.setDate(r.getDate() - (day === 0 ? 6 : day - 1)); return r; };
const monthFirst  = d   => new Date(d.getFullYear(), d.getMonth(), 1);
const fmtShort    = iso => new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
const fmtLong     = iso => new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

/* ══════════════════════════════════════════════════════════════════════
   METRICS AGGREGATION
   ══════════════════════════════════════════════════════════════════════ */
function computeMetrics(records, period, selectedDate) {
  if (!records?.length) return null;

  let rows;
  if (period === 'daily') {
    if (!selectedDate) return null;
    rows = records.filter(r => r.fields[F.date] === selectedDate);
  } else {
    /* WTD/MTD: try the live period first; if no records (data is historical)
       fall back to the most recent week/month that has data in Airtable. */
    const now = todayLocal();
    const liveStart = isoStr(period === 'wtd' ? weekMonday(now) : monthFirst(now));
    const liveEnd   = isoStr(now);
    rows = records.filter(r => { const d = r.fields[F.date]; return d && d >= liveStart && d <= liveEnd; });

    if (!rows.length) {
      /* Sort all available dates and walk backwards to find the most recent
         week (Mon–last data day) or month (1st–last data day) with records. */
      const allDates = records.map(r => r.fields[F.date]).filter(Boolean).sort();
      const latestDate = allDates[allDates.length - 1];
      if (latestDate) {
        const latestD    = new Date(latestDate + 'T00:00:00');
        const fallStart  = isoStr(period === 'wtd' ? weekMonday(latestD) : monthFirst(latestD));
        rows = records.filter(r => { const d = r.fields[F.date]; return d && d >= fallStart && d <= latestDate; });
        console.log(
          `[SCG Ops OS] ${period.toUpperCase()} fallback — no records in live range (${liveStart}→${liveEnd}).` +
          ` Using ${fallStart} → ${latestDate} (${rows.length} records).`
        );
      }
    }
  }
  if (!rows.length) return null;

  const n   = rows.length;
  const sum = k => rows.reduce((a, r) => a + (parseFloat(r.fields[k]) || 0), 0);
  const avg = k => { const s = sum(k); return s === 0 ? null : s / n; };

  /* TY totals */
  const grossSales   = sum(F.grossSales);
  const salesBudget  = rows.reduce((a, r) => a + getSalesBudget(r), 0);
  if (salesBudget === 0) console.warn('[SCG Ops OS] salesBudget=0 — check SALES_BUDGET_VARIANTS vs actual field name.');
  const laborCost    = sum(F.laborCost);
  const laborHours   = sum(F.laborHours) || null;
  const transactions = sum(F.transactions);

  /* TY rates — averaged for WTD/MTD */
  let laborPct    = avg(F.laborPct);
  let foodCostPct = avg(F.foodCostPct);
  let wastePct    = avg(F.wastePct);
  let splh        = avg(F.splh);
  let avgCheck    = avg(F.avgCheck);

  /* Fallback: compute rates from raw totals if stored field is blank */
  if (!laborPct  && grossSales && laborCost)    laborPct  = (laborCost  / grossSales) * 100;
  if (!splh      && grossSales && laborHours)   splh      = grossSales  / laborHours;
  if (!avgCheck  && grossSales && transactions) avgCheck  = grossSales  / transactions;

  /* LY totals — same aggregation logic as TY */
  const lyGrossSales  = sum(F.lyGrossSales)  || null;
  const lyLaborHours  = sum(F.lyLaborHours)  || null;
  let   lyLaborPct    = avg(F.lyLaborPct);
  let   lySplh        = avg(F.lySplh);
  let   lyAvgCheck    = avg(F.lyAvgCheck);

  /* Date label for display */
  const dates = rows.map(r => r.fields[F.date]).filter(Boolean).sort();
  let dateLabel = '';
  if (period === 'daily')        dateLabel = dates[0] ? fmtLong(dates[0]) : '';
  else if (dates.length >= 2)    dateLabel = `${fmtShort(dates[0])} – ${fmtShort(dates[dates.length - 1])}`;
  else if (dates.length === 1)   dateLabel = fmtShort(dates[0]);

  return {
    grossSales, salesBudget, laborCost, laborHours, transactions,
    laborPct, foodCostPct, wastePct, splh, avgCheck, dateLabel,
    lyGrossSales, lyLaborHours, lyLaborPct, lySplh, lyAvgCheck,
  };
}

/* ══════════════════════════════════════════════════════════════════════
   STATUS & COLOR LOGIC
   ══════════════════════════════════════════════════════════════════════ */
const CLR = { green: '#22c55e', yellow: '#eab308', red: '#ef4444', gray: '#374151' };

function kpiStatus(actual, target, yellowThresh, higherIsBetter) {
  if (actual == null || target == null || isNaN(actual) || isNaN(target)) return 'gray';
  if (higherIsBetter) {
    if (actual >= target) return 'green';
    if (yellowThresh != null && !isNaN(yellowThresh) && actual >= yellowThresh) return 'yellow';
    return 'red';
  } else {
    if (actual <= target) return 'green';
    if (yellowThresh != null && !isNaN(yellowThresh) && actual <= yellowThresh) return 'yellow';
    return 'red';
  }
}

function ringFill(actual, target, higherIsBetter) {
  if (!actual || !target || isNaN(actual) || isNaN(target)) return 0;
  return Math.min(Math.max(higherIsBetter ? actual / target : target / actual, 0), 1);
}

/* Format an absolute difference value for display based on KPI type */
function fmtDiff(absDiff, kpi) {
  if (kpi === KPI.SALES)
    return absDiff >= 1000 ? `$${(absDiff / 1000).toFixed(1)}k` : `$${Math.round(absDiff).toLocaleString('en-US')}`;
  if (kpi === KPI.SPLH || kpi === KPI.AVG_CHECK)
    return `$${absDiff.toFixed(2)}`;
  if (kpi === KPI.LABOR_HRS)
    return `${absDiff.toFixed(1)} hrs`;
  return `${absDiff.toFixed(1)}%`;
}

/* Variance badge — raw subtraction only, no division.
   Higher-is-better : diff = actual − target  (positive = good)
   Lower-is-better  : diff = target − actual  (positive = good)
   Badge color is always green (good) / red (bad), independent of the yellow zone. */
function varianceBadge(actual, target, higherIsBetter, kpi) {
  if (actual == null || target == null || isNaN(actual) || isNaN(target)) return null;
  const diff    = higherIsBetter ? actual - target : target - actual;
  const absDiff = Math.abs(diff);
  const isGood  = diff >= 0;
  const arrow   = higherIsBetter ? (isGood ? '▲' : '▼') : (isGood ? '▼' : '▲');
  const dir     = higherIsBetter ? (isGood ? 'above target' : 'below target') : (isGood ? 'below target' : 'above target');
  return { label: `${arrow} ${fmtDiff(absDiff, kpi)} ${dir}`, isGood };
}

/* ══════════════════════════════════════════════════════════════════════
   FORMATTING
   ══════════════════════════════════════════════════════════════════════ */
function fmtVal(v, kpi) {
  if (v == null || isNaN(v)) return '—';
  switch (kpi) {
    case KPI.SALES:
      return v >= 10000 ? `$${(v / 1000).toFixed(1)}k` : `$${Math.round(v).toLocaleString('en-US')}`;
    case KPI.AVG_CHECK:
    case KPI.SPLH:
      return `$${v.toFixed(2)}`;
    case KPI.LABOR_HRS:
      return `${v.toFixed(1)} hrs`;
    case KPI.LABOR:
    case KPI.FOOD_COST:
    case KPI.WASTE:
      return `${v.toFixed(1)}%`;
    default:
      return v.toFixed(2);
  }
}

/* ══════════════════════════════════════════════════════════════════════
   COMPONENT: StatusRing
   ══════════════════════════════════════════════════════════════════════ */
function StatusRing({ fill = 0, status = 'gray', size = 148, children }) {
  const sw = 11, r = (size - sw * 2) / 2, c = 2 * Math.PI * r;
  const offset = c * (1 - Math.min(Math.max(fill, 0), 1));
  const color = CLR[status] ?? CLR.gray;
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)', overflow: 'visible' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e2a4a" strokeWidth={sw} />
        <circle cx={size/2} cy={size/2} r={r}
          fill="none" stroke={color} strokeWidth={sw}
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={offset}
          className="ring-progress"
          style={{ filter: status !== 'gray' ? `drop-shadow(0 0 6px ${color}88)` : 'none' }}
        />
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2 }}>
        {children}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════
   COMPONENT: KPICard
   ══════════════════════════════════════════════════════════════════════ */
function KPICard({ kpi, actual, target, yellowThreshold, higherIsBetter, ly, loading }) {
  const [showLY, setShowLY] = useState(false);
  const hasLY    = ly != null && !isNaN(ly) && ly !== 0;
  const dispVal  = (showLY && hasLY) ? ly : actual;

  const status   = loading ? 'gray' : kpiStatus(dispVal, target, yellowThreshold, higherIsBetter);
  const fill     = loading ? 0      : ringFill(dispVal, target, higherIsBetter);
  const varInfo  = loading ? null   : varianceBadge(dispVal, target, higherIsBetter, kpi);
  const color    = CLR[status];
  const badgeClr = varInfo ? (varInfo.isGood ? CLR.green : CLR.red) : color;

  /* TY vs LY comparison shown only in LY mode */
  const vsLY = (!loading && showLY && hasLY && actual != null && !isNaN(actual)) ? (() => {
    const diff   = actual - ly;
    const isGood = higherIsBetter ? diff > 0 : diff < 0;
    const arrow  = diff > 0 ? '▲' : (diff < 0 ? '▼' : '→');
    return { label: `TY ${arrow} ${fmtDiff(Math.abs(diff), kpi)} vs LY`, isGood };
  })() : null;

  const Toggle = () => (
    <div style={{ display: 'flex', gap: 1, background: '#0d0d1b', borderRadius: 7, padding: 2, border: '1px solid var(--border)' }}>
      {['TY', 'LY'].map(mode => (
        <button key={mode} onClick={() => setShowLY(mode === 'LY')} style={{
          padding: '2px 7px', borderRadius: 5, border: 'none', cursor: 'pointer',
          fontFamily: 'inherit', fontSize: 10, fontWeight: 700, letterSpacing: '0.05em',
          background: (mode === 'LY') === showLY ? 'var(--purple)' : 'transparent',
          color:      (mode === 'LY') === showLY ? '#fff'          : 'var(--text-dim)',
          transition: 'background 0.15s',
        }}>{mode}</button>
      ))}
    </div>
  );

  return (
    <div style={{
      background: 'var(--bg-card)', borderRadius: 18,
      border: `1px solid ${status === 'gray' ? 'var(--border)' : `${color}44`}`,
      padding: '16px 16px 18px', display: 'flex', flexDirection: 'column',
      alignItems: 'center', gap: 10, transition: 'border-color 0.4s ease',
    }}>
      <div style={{ display: 'flex', width: '100%', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--text-secondary)' }}>
          {kpi}
        </div>
        {!loading && hasLY && <Toggle />}
      </div>

      <StatusRing fill={fill} status={status} size={148}>
        {loading ? (
          <div className="skeleton" style={{ width: 60, height: 28 }} />
        ) : (
          <>
            <div style={{ fontSize: 30, fontWeight: 900, color, lineHeight: 1, letterSpacing: '-0.03em', fontVariantNumeric: 'tabular-nums' }}>
              {fmtVal(dispVal, kpi)}
            </div>
            <div style={{ fontSize: 11, color: 'var(--text-dim)', fontWeight: 500, marginTop: 3 }}>
              {showLY ? 'last year' : `target ${fmtVal(target, kpi)}`}
            </div>
          </>
        )}
      </StatusRing>

      {!loading && varInfo && (
        <div style={{ fontSize: 12, fontWeight: 700, color: badgeClr, background: `${badgeClr}18`, border: `1px solid ${badgeClr}38`, padding: '3px 12px', borderRadius: 20 }}>
          {varInfo.label}
        </div>
      )}
      {!loading && vsLY && (
        <div style={{ fontSize: 11, fontWeight: 600, color: vsLY.isGood ? CLR.green : CLR.red, opacity: 0.85 }}>
          {vsLY.label}
        </div>
      )}

/* ══════════════════════════════════════════════════════════════════════
   COMPONENT: DateNavigator
   Shows ← date ▾ → for the Daily period.
   Dates list contains only dates that have actual Airtable records.
   ══════════════════════════════════════════════════════════════════════ */
function DateNavigator({ dates, selected, onSelect }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    if (!open) return;
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, [open]);

  if (!dates.length) return <span style={{ color: 'var(--text-dim)', fontSize: 14 }}>No data</span>;

  /* dates is sorted newest-first; idx 0 = most recent */
  const idx = selected ? dates.indexOf(selected) : 0;
  const safeIdx  = idx < 0 ? 0 : idx;
  const canPrev  = safeIdx < dates.length - 1;   // ← go to older date
  const canNext  = safeIdx > 0;                  // → go to newer date
  const display  = dates[safeIdx] ? fmtLong(dates[safeIdx]) : '—';

  const NavBtn = ({ label, disabled, onClick }) => (
    <button onClick={onClick} disabled={disabled} style={{
      background: '#1e2a4a', border: '1px solid var(--border)', borderRadius: 8,
      padding: '7px 12px', cursor: disabled ? 'default' : 'pointer',
      color: disabled ? 'var(--text-dim)' : 'var(--text-secondary)',
      fontSize: 15, fontWeight: 700, lineHeight: 1,
      opacity: disabled ? 0.3 : 1, transition: 'opacity 0.15s, color 0.15s',
    }}>{label}</button>
  );

  return (
    <div ref={ref} style={{ position: 'relative', display: 'flex', alignItems: 'center', gap: 6, zIndex: 10 }}>
      <NavBtn label="←" disabled={!canPrev} onClick={() => canPrev && onSelect(dates[safeIdx + 1])} />

      <button onClick={() => setOpen(o => !o)} style={{
        background: '#1e2a4a',
        border: `1px solid ${open ? 'var(--purple)' : 'var(--border)'}`,
        borderRadius: 9, padding: '7px 14px', cursor: 'pointer',
        fontFamily: 'inherit', fontWeight: 700, fontSize: 13, color: 'var(--text-primary)',
        display: 'flex', alignItems: 'center', gap: 7, whiteSpace: 'nowrap',
        transition: 'border-color 0.15s',
        boxShadow: open ? '0 0 0 2px #6366f144' : 'none',
      }}>
        <span>📅</span>
        <span>{display}</span>
        <span style={{ fontSize: 9, opacity: 0.5, marginLeft: 2 }}>▾</span>
      </button>

      <NavBtn label="→" disabled={!canNext} onClick={() => canNext && onSelect(dates[safeIdx - 1])} />

      {open && (
        <div style={{
          position: 'absolute', top: 'calc(100% + 6px)', left: '50%', transform: 'translateX(-50%)',
          background: '#1a1f3a', border: '1px solid var(--border)', borderRadius: 12,
          boxShadow: '0 20px 60px rgba(0,0,0,0.75)', padding: 6,
          zIndex: 200, maxHeight: 260, overflowY: 'auto', minWidth: 210,
        }}>
          {dates.map(d => {
            const isCur = d === dates[safeIdx];
            return (
              <button key={d} onClick={() => { onSelect(d); setOpen(false); }}
                style={{
                  display: 'block', width: '100%', textAlign: 'left',
                  padding: '9px 14px', borderRadius: 8, border: 'none',
                  cursor: 'pointer', fontFamily: 'inherit', fontSize: 13, fontWeight: 600,
                  background: isCur ? '#6366f120' : 'transparent',
                  color: isCur ? 'var(--purple)' : 'var(--text-secondary)',
                  transition: 'background 0.1s',
                }}
                onMouseEnter={e => { if (!isCur) e.currentTarget.style.background = '#ffffff0d'; }}
                onMouseLeave={e => { e.currentTarget.style.background = isCur ? '#6366f120' : 'transparent'; }}
              >
                {fmtLong(d)}
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════
   COMPONENT: TokenSetupModal
   Token is validated against Airtable before being saved.
   Stored in localStorage — never committed to any file.
   ══════════════════════════════════════════════════════════════════════ */
function TokenSetupModal({ onSave, isReset }) {
  const [tok,    setTok   ] = useState('');
  const [err,    setErr   ] = useState('');
  const [saving, setSaving] = useState(false);

  const handleSave = async () => {
    const t = tok.trim();
    if (!t) { setErr('Please enter your Airtable Personal Access Token.'); return; }
    setSaving(true);
    setErr('');
    try {
      /* Quick auth check — fetch 1 record so we know the token works */
      const res = await fetch(
        `https://api.airtable.com/v0/${CONFIG.BASE_ID}/${encodeURIComponent(CONFIG.SALES_TABLE)}?pageSize=1`,
        { headers: { Authorization: `Bearer ${t}` } }
      );
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        setErr(`Airtable rejected the token (${res.status}): ${j.error?.message || 'Invalid token or insufficient permissions.'}`);
        return;
      }
      onSave(t);
    } catch {
      setErr('Network error — check your connection and try again.');
    } finally {
      setSaving(false);
    }
  };

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg-base)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
      <div style={{ background: 'var(--bg-card)', borderRadius: 20, border: '1px solid var(--border)', padding: 36, maxWidth: 480, width: '100%', boxShadow: '0 32px 80px rgba(0,0,0,0.8)' }}>

        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 28 }}>
          <span style={{ fontSize: 24, fontWeight: 900, color: 'var(--text-primary)' }}>SCG</span>
          <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--purple)', background: '#6366f118', border: '1px solid #6366f140', padding: '3px 10px', borderRadius: 6, letterSpacing: '0.1em' }}>OPS OS</span>
        </div>

        <div style={{ fontSize: 22, fontWeight: 800, color: 'var(--text-primary)', marginBottom: 8 }}>
          {isReset ? '🔑 New Token Required' : '🔑 Connect to Airtable'}
        </div>

        <p style={{ fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.75, marginBottom: 20 }}>
          {isReset
            ? 'Your previous token was revoked or expired. Enter your new read-only token below.'
            : 'Your token is saved only in this browser\'s local storage — it is never written to any file, never committed to GitHub, and never sent anywhere except directly to Airtable.'}
        </p>

        <div style={{ background: '#0d0d1b', borderRadius: 10, padding: '13px 16px', marginBottom: 20, fontSize: 12, color: 'var(--text-dim)', lineHeight: 1.8 }}>
          📋 Create a token at <strong style={{ color: 'var(--text-secondary)' }}>airtable.com/create/tokens</strong><br />
          Required scope: <code style={{ background: '#1e2a4a', padding: '1px 6px', borderRadius: 4 }}>data.records:read</code><br />
          Base access: <code style={{ background: '#1e2a4a', padding: '1px 6px', borderRadius: 4 }}>appTxjUklSxnapgJr</code>
        </div>

        <input
          type="password"
          value={tok}
          onChange={e => { setTok(e.target.value); setErr(''); }}
          onKeyDown={e => e.key === 'Enter' && !saving && handleSave()}
          placeholder="pat…"
          autoFocus
          style={{
            width: '100%', padding: '12px 14px', borderRadius: 10,
            background: '#0d0d1b', border: `1px solid ${err ? '#ef4444' : 'var(--border)'}`,
            color: 'var(--text-primary)', fontSize: 14, fontFamily: 'inherit',
            outline: 'none', marginBottom: err ? 8 : 16, transition: 'border-color 0.2s',
          }}
        />
        {err && <div style={{ fontSize: 12, color: '#ef4444', marginBottom: 14, lineHeight: 1.5 }}>{err}</div>}

        <button onClick={handleSave} disabled={saving} style={{
          width: '100%', padding: '13px', borderRadius: 10, border: 'none',
          background: saving ? '#2d3561' : 'var(--purple)', color: '#fff',
          fontFamily: 'inherit', fontWeight: 800, fontSize: 14, letterSpacing: '0.05em',
          cursor: saving ? 'default' : 'pointer',
          boxShadow: saving ? 'none' : '0 4px 16px #6366f144', transition: 'all 0.2s',
        }}>
          {saving ? 'Verifying token…' : 'Connect Dashboard →'}
        </button>
      </div>
    </div>
  );
}

   LOCATION HELPERS
   ══════════════════════════════════════════════════════════════════════ */
/* Store # is a lookup field — Airtable returns it as an array */
function getStoreNum(record) {
  const v = record.fields[F.storeNum];
  if (v == null) return null;
  const raw = Array.isArray(v) ? v[0] : v;
  return raw != null ? String(raw).trim() : null;
}

/* ══════════════════════════════════════════════════════════════════════
   APP ROOT
   ══════════════════════════════════════════════════════════════════════ */
function App() {
  /* Token lives in localStorage — never in source code */
  const [token,          setToken         ] = useState(() => localStorage.getItem(CONFIG.LS_KEY) || '');
  const [period,         setPeriod        ] = useState('daily');
  const [salesRows,      setSalesRows     ] = useState([]);
  const [targetsMap,     setTargetsMap    ] = useState({});
  const [loading,        setLoading       ] = useState(false);
  const [error,          setError         ] = useState(null);
  const [isAuthErr,      setIsAuthErr     ] = useState(false);
  const [lastUpdated,    setLastUpdated   ] = useState(null);
  const [selectedDate,   setSelectedDate  ] = useState(null);
  const [selectedStore,  setSelectedStore ] = useState(null); // null = all locations

  /* Unique sorted store numbers from all records */
  const availableStores = useMemo(() => {
    const nums = [...new Set(salesRows.map(r => getStoreNum(r)).filter(Boolean))];
    return nums.sort();
  }, [salesRows]);

  /* Records filtered to the selected store (null = all) */
  const filteredRows = useMemo(() => {
    if (!selectedStore) return salesRows;
    return salesRows.filter(r => getStoreNum(r) === selectedStore);
  }, [salesRows, selectedStore]);

  /* Sorted newest-first list of dates that have records for the active location filter */
  const availableDates = useMemo(() => {
    const ds = [...new Set(filteredRows.map(r => r.fields[F.date]).filter(Boolean))];
    return ds.sort().reverse();
  }, [filteredRows]);

  /* Resolved display date: user's pick if valid, else most recent */
  const resolvedDate = useMemo(() => {
    if (selectedDate && availableDates.includes(selectedDate)) return selectedDate;
    return availableDates[0] ?? null;
  }, [selectedDate, availableDates]);

  const doLoad = useCallback(async tok => {
    setLoading(true);
    setError(null);
    setIsAuthErr(false);
    try {
      const [sales, targets] = await Promise.all([
        fetchAll(CONFIG.SALES_TABLE, tok),
        fetchAll(CONFIG.TARGETS_TABLE, tok),
      ]);
      /* Debug: log every field name from the first Daily Sales record */
      if (sales.length > 0) {
        console.group('[SCG Ops OS] Daily Sales & Labor — raw API response (first record)');
        const fieldNames = Object.keys(sales[0].fields);
        console.log('All field names:', fieldNames);
        console.log('Full first record fields:', { ...sales[0].fields });
        const lyFields = [F.lyGrossSales, F.lyLaborPct, F.lyLaborHours, F.lySplh, F.lyAvgCheck];
        lyFields.forEach(f => {
          const present = fieldNames.some(k => k.trim().toLowerCase() === f.trim().toLowerCase());
          console.log(`LY field "${f}":`, present ? `✅ found → ${sales[0].fields[f]}` : '⚠️ NOT FOUND in record');
        });
        const budgetField = SALES_BUDGET_VARIANTS.find(name => {
          if (name in sales[0].fields) return true;
          const norm = name.trim().toLowerCase();
          return fieldNames.some(k => k.trim().toLowerCase() === norm);
        });
        console.log('Sales budget field matched:', budgetField ?? '⚠️  NONE — check SALES_BUDGET_VARIANTS');
        console.log('Sales budget value (first record):', getSalesBudget(sales[0]));
        console.log('Store # (first record):', getStoreNum(sales[0]));
        console.groupEnd();
      }
      setSalesRows(sales);
      setTargetsMap(buildTargets(targets));
      setLastUpdated(new Date());
    } catch (err) {
      console.error('[SCG Ops OS]', err);
      if (err.isAuthError) { setIsAuthErr(true); setError(err.message); }
      else setError(err.message || 'Failed to load data from Airtable.');
    } finally {
      setLoading(false);
    }
  }, []);

  const handleSaveToken = useCallback(t => {
    localStorage.setItem(CONFIG.LS_KEY, t);
    setToken(t);
    setIsAuthErr(false);
    doLoad(t);
  }, [doLoad]);

  const handleResetToken = useCallback(() => {
    localStorage.removeItem(CONFIG.LS_KEY);
    setToken('');
    setIsAuthErr(false);
    setSalesRows([]);
    setTargetsMap({});
    setError(null);
    setLastUpdated(null);
  }, []);

  /* Load on mount if we already have a token */
  useEffect(() => { if (token) doLoad(token); }, []); // eslint-disable-line

  /* Auto-refresh */
  useEffect(() => {
    if (!token) return;
    const id = setInterval(() => doLoad(token), CONFIG.REFRESH_MS);
    return () => clearInterval(id);
  }, [token, doLoad]);

  const metrics = useMemo(() =>
    computeMetrics(filteredRows, period, resolvedDate),
    [filteredRows, period, resolvedDate]
  );

  /* Build KPI card data — includes LY values for cards that have them.
     Sales target: sum of daily salesBudget field, fallback to KPI Targets row.
     Yellow threshold for Sales: 95% of budget. */
  const kpiCards = useMemo(() => {
    const t = name => targetsMap[name] ?? {};
    const salesBudget = metrics?.salesBudget ?? 0;
    const salesTarget = salesBudget > 0 ? salesBudget : (t(KPI.SALES).target ?? null);
    return [
      { kpi: KPI.SALES,      actual: metrics?.grossSales  ?? null, target: salesTarget, yellowThreshold: salesTarget ? salesTarget * 0.95 : null, higherIsBetter: true, ly: metrics?.lyGrossSales  ?? null },
      { kpi: KPI.LABOR,      actual: metrics?.laborPct    ?? null, ...t(KPI.LABOR),                                                                                       ly: metrics?.lyLaborPct    ?? null },
      { kpi: KPI.LABOR_HRS,  actual: metrics?.laborHours  ?? null, ...t(KPI.LABOR_HRS),                                                                                   ly: metrics?.lyLaborHours  ?? null },
      { kpi: KPI.FOOD_COST,  actual: metrics?.foodCostPct ?? null, ...t(KPI.FOOD_COST)  },
      { kpi: KPI.WASTE,      actual: metrics?.wastePct    ?? null, ...t(KPI.WASTE)      },
      { kpi: KPI.SPLH,       actual: metrics?.splh        ?? null, ...t(KPI.SPLH),                                                                                         ly: metrics?.lySplh        ?? null },
      { kpi: KPI.AVG_CHECK,  actual: metrics?.avgCheck    ?? null, ...t(KPI.AVG_CHECK),                                                                                    ly: metrics?.lyAvgCheck    ?? null },
    ];
  }, [metrics, targetsMap]);

  /* Fix 5 — only show cards that have at least a target or actual data.
     While loading, show all 6 as skeletons so the layout doesn't jump. */
  const visibleCards = useMemo(() => {
    if (loading) return kpiCards;
    return kpiCards.filter(c =>
      (c.actual != null && !isNaN(c.actual)) ||
      (c.target != null && !isNaN(c.target))
    );
  }, [kpiCards, loading]);

  /* Dynamic column count: 4 cards → 2×2, otherwise up to 3 cols */
  const gridCols   = visibleCards.length === 4 ? 2 : Math.min(Math.max(visibleCards.length, 1), 3);
  const cardBasis  = `calc((100% - ${14 * (gridCols - 1)}px) / ${gridCols})`;

  /* Show token setup if we don't have one or if auth failed */
  if (!token || isAuthErr) {
    return <TokenSetupModal onSave={handleSaveToken} isReset={isAuthErr} />;
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      <Header
        lastUpdated={lastUpdated} loading={loading}
        onRefresh={() => doLoad(token)} onResetToken={handleResetToken}
      />

      <main style={{ flex: 1, padding: '20px 20px 32px', maxWidth: 980, width: '100%', margin: '0 auto' }}>
        {error && !isAuthErr && <ErrorBanner message={error} onRetry={() => doLoad(token)} />}

        <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 16 }}>
          <PeriodToggle value={period} onChange={setPeriod} />
        </div>

        <LocationFilter stores={availableStores} selected={selectedStore} onChange={setSelectedStore} />

        <div className="kpi-grid" style={{ marginBottom: 16 }}>
          {visibleCards.map(c => (
            <div key={c.kpi} className="kpi-card-wrap" style={{ '--card-basis': cardBasis }}>
              <KPICard {...c} loading={loading} />
            </div>
          ))}
        </div>

        <SummaryBar
          metrics={metrics} loading={loading} period={period}
          availableDates={availableDates} selectedDate={resolvedDate}
          onDateSelect={setSelectedDate}
        />
      </main>

      <footer style={{ textAlign: 'center', padding: '10px', fontSize: 10, color: 'var(--text-dim)', borderTop: '1px solid var(--border)', letterSpacing: '0.06em' }}>
        SCG OPS OS · Auto-refreshes every {CONFIG.REFRESH_MS / 60000} min
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
